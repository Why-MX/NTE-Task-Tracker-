<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NTE Weapons (Arcs) Database — Neverness to Everness</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0F0E17;--bg2:#1A1825;--bg3:#221F32;--border:#2E2A44;
  --text:#EBE9F8;--text2:#9E9AC0;--text3:#5C5880;
  --accent:#7B5CF5;--accent2:#534AB7;--pink:#E85D9E;
  --s-rank:#D9A93C;--a-rank:#C15FE0;--b-rank:#4E8FE8;
  --radius:10px;
  --app-pad: clamp(0.75rem, 4vw, 1.5rem);
}
html{-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh}
.app{max-width:1100px;margin:0 auto;padding:clamp(1rem,4vw,2rem) var(--app-pad) 5rem}

/* header */
.header{display:flex;align-items:center;gap:14px;margin-bottom:1rem;flex-wrap:wrap;row-gap:10px}
.logo{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 0 24px rgba(123,92,245,.25)}
.logo i{font-size:22px;color:#fff}
.header-text h1{font-size:clamp(17px,4vw,22px);font-weight:700;letter-spacing:-.3px}
.header-text p{font-size:12px;color:var(--text2);margin-top:2px}
.sub{color:var(--text2);font-size:13px;max-width:600px;margin:0 0 24px;line-height:1.6}

/* toolbar */
.toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:200px}
.search-wrap i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:16px}
.search-input{width:100%;padding:10px 12px 10px 36px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:13px;font-family:inherit}
.search-input:focus{outline:none;border-color:var(--accent)}
.filter-select{padding:10px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:13px;font-family:inherit;cursor:pointer}
.filter-select:focus{outline:none;border-color:var(--accent)}

/* custom themed dropdown (replaces native <select> so the open menu matches the site theme) */
.dropdown{position:relative}
.dropdown-btn{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:13px;font-family:inherit;cursor:pointer;white-space:nowrap}
.dropdown-btn:hover{border-color:var(--text3)}
.dropdown.open .dropdown-btn{border-color:var(--accent)}
.dropdown-btn i.ti-chevron-down{margin-left:auto;font-size:13px;color:var(--text3);transition:transform .15s}
.dropdown.open .dropdown-btn i.ti-chevron-down{transform:rotate(180deg)}
.dropdown-menu{position:absolute;top:calc(100% + 6px);left:0;min-width:180px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 12px 28px rgba(0,0,0,.45);padding:6px;z-index:20;display:none}
.dropdown.open .dropdown-menu{display:block}
.dropdown-item{padding:9px 11px;border-radius:7px;font-size:13px;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:8px}
.dropdown-item:hover{background:var(--bg3);color:var(--text)}
.dropdown-item.active{color:var(--accent);font-weight:600}
.dropdown-item.active:after{content:'\2713';font-weight:800}

/* rarity filter row */
.rarity-row{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.rarity-label{font-size:11px;font-weight:700;letter-spacing:.6px;color:var(--text2);display:flex;align-items:center;gap:6px}
.rarity-btns{display:flex;gap:8px}
.rarity-btn{width:34px;height:34px;border-radius:9px;border:1.5px solid var(--border);background:var(--bg2);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;cursor:pointer;transition:all .15s}
.rarity-btn.s{color:var(--s-rank)}
.rarity-btn.a{color:var(--a-rank)}
.rarity-btn.b{color:var(--b-rank)}
.rarity-btn.active.s{background:rgba(217,169,60,.16);border-color:var(--s-rank)}
.rarity-btn.active.a{background:rgba(193,95,224,.16);border-color:var(--a-rank)}
.rarity-btn.active.b{background:rgba(78,143,232,.16);border-color:var(--b-rank)}
.rarity-btn:hover{border-color:var(--text3)}

.result-count{font-size:11px;color:var(--text3);font-weight:600;letter-spacing:.4px;margin-bottom:14px;text-transform:uppercase}

/* grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.wcard{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;gap:12px;cursor:pointer;transition:border-color .15s,transform .1s}
.wcard:hover{transform:translateY(-2px)}
.wcard.s{border-color:rgba(217,169,60,.35)}
.wcard.s:hover{border-color:var(--s-rank)}
.wcard.a{border-color:rgba(193,95,224,.3)}
.wcard.a:hover{border-color:var(--a-rank)}
.wcard.b{border-color:rgba(78,143,232,.3)}
.wcard.b:hover{border-color:var(--b-rank)}
.wicon{width:50px;height:50px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;color:#fff}
.wcard.s .wicon{background:linear-gradient(160deg,#E8C766,var(--s-rank))}
.wcard.a .wicon{background:linear-gradient(160deg,#D98CEE,var(--a-rank))}
.wcard.b .wicon{background:linear-gradient(160deg,#7FB0EE,var(--b-rank))}
.wbody{flex:1;min-width:0}
.wname{font-size:13.5px;font-weight:700;line-height:1.3;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wrank{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:4px;font-size:9px;font-weight:800;margin-bottom:7px;color:#160009}
.wrank.s{background:var(--s-rank)}
.wrank.a{background:var(--a-rank)}
.wrank.b{background:var(--b-rank)}
.wstats{display:flex;gap:16px}
.wstat-label{font-size:8.5px;font-weight:700;letter-spacing:.5px;color:var(--text3)}
.wstat-val{font-size:12.5px;font-weight:700;color:var(--text);margin-top:1px}
.wstat-val.accent2{color:var(--pink)}

.empty-msg{grid-column:1/-1;text-align:center;padding:40px;color:var(--text3);font-size:13px}

@media(max-width:480px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="logo"><i class="ti ti-sword"></i></div>
    <div class="header-text">
      <h1>Weapons (Arcs) Database</h1>
      <p>Neverness to Everness — all catalogued Arcs</p>
    </div>
  </div>
  <p class="sub">Browse the complete collection of Arcs — powerful weapons that enhance your characters' abilities. Search or filter by rarity to find the right one.</p>

  <div class="toolbar">
    <div class="search-wrap">
      <i class="ti ti-search"></i>
      <input id="searchInput" class="search-input" placeholder="Search database…" oninput="render()">
    </div>
    <div class="dropdown" id="sortDropdown">
      <div class="dropdown-btn" onclick="toggleDropdown(event)">
        <i class="ti ti-arrows-sort"></i>
        <span id="sortLabel">Sort by Rarity</span>
        <i class="ti ti-chevron-down"></i>
      </div>
      <div class="dropdown-menu" id="sortMenu">
        <div class="dropdown-item active" data-value="rarity" onclick="selectSort(this)">Sort by Rarity</div>
        <div class="dropdown-item" data-value="name" onclick="selectSort(this)">Sort by Name</div>
        <div class="dropdown-item" data-value="atk" onclick="selectSort(this)">Sort by ATK</div>
      </div>
    </div>
  </div>

  <div class="rarity-row">
    <div class="rarity-label"><i class="ti ti-filter"></i>FILTER RARITY:</div>
    <div class="rarity-btns">
      <div class="rarity-btn s active" data-rank="S" onclick="toggleRank(this)">S</div>
      <div class="rarity-btn a active" data-rank="A" onclick="toggleRank(this)">A</div>
      <div class="rarity-btn b active" data-rank="B" onclick="toggleRank(this)">B</div>
    </div>
  </div>

  <div class="result-count" id="resultCount"></div>
  <div class="grid" id="grid"></div>

</div>

<script>
const RANK_ORDER={S:0,A:1,B:2};

// ─── Data — transcribed from the in-game Weapons (Arcs) Database ───────────
const ARCS=[
  {name:"Good Boy's Grand Adventure",rank:'S',atk:474,stat:'ATK',val:'45%'},
  {name:'Camellia Society',rank:'S',atk:666,stat:'Crit Rate',val:'12%'},
  {name:'Day Off',rank:'S',atk:512,stat:'Charge Efficiency',val:'33%'},
  {name:'Ready-Ready',rank:'S',atk:570,stat:'Crit Rate',val:'24%'},
  {name:'Blow up the Crowd',rank:'S',atk:512,stat:'ATK',val:'27.5%'},
  {name:'Youthful Fantasy',rank:'S',atk:570,stat:'ATK',val:'30%'},
  {name:'Contemplative Cat',rank:'S',atk:512,stat:'Crit DMG',val:'44%'},
  {name:'Your Happiness is Priceless',rank:'S',atk:512,stat:'DEF',val:'38.5%'},
  {name:'Raging Flames',rank:'S',atk:481,stat:'Crit DMG',val:'24%'},
  {name:'Eternal Waltz',rank:'S',atk:424,stat:'HP',val:'41.2%'},
  {name:"Hethereau's Keeper",rank:'S',atk:512,stat:'ATK',val:'27.5%'},
  {name:'Fluff of Fortitude',rank:'S',atk:512,stat:'ATK',val:'27.5%'},
  {name:'Fluff of Ferocity',rank:'S',atk:512,stat:'ATK',val:'27.5%'},
  {name:'Fluff of Finesse',rank:'S',atk:512,stat:'ATK',val:'27.5%'},
  {name:'Fluff of Fleetness',rank:'S',atk:512,stat:'Crit DMG',val:'44%'},
  {name:'Fluff of Fearlessness',rank:'S',atk:512,stat:'Crit Rate',val:'22%'},
  {name:'Reality Refuge',rank:'S',atk:570,stat:'ATK',val:'30%'},
  {name:'Tears Beneath the Mask',rank:'S',atk:512,stat:'ATK',val:'27.5%'},
  {name:'Song of the Whale',rank:'S',atk:512,stat:'ATK',val:'27.5%'},
  {name:'Marching Beyond Time',rank:'S',atk:570,stat:'Crit Rate',val:'24%'},
  {name:'The Last Rose',rank:'S',atk:570,stat:'Crit Rate',val:'24%'},
  {name:'The Rain That Shook the World',rank:'S',atk:512,stat:'Crit Rate',val:'22%'},
  {name:'Stellar Veil',rank:'S',atk:512,stat:'ATK',val:'27.5%'},
  {name:"What's Desired",rank:'S',atk:570,stat:'Crit Rate',val:'24%'},
  {name:'Umbrella',rank:'A',atk:395,stat:'DEF',val:'52.5%'},
  {name:'Cosmos Daze, Wild Reverie',rank:'A',atk:475,stat:'ATK',val:'25%'},
  {name:'Shiny Days',rank:'A',atk:475,stat:'ATK',val:'25%'},
  {name:'The Forgotten',rank:'A',atk:475,stat:'HP',val:'25%'},
  {name:'Oraora!',rank:'A',atk:395,stat:'ATK',val:'37.5%'},
  {name:'Mind Royale',rank:'A',atk:555,stat:'Break Intensity',val:'60'},
  {name:'The Good, The Bad, The Bitter',rank:'A',atk:475,stat:'HP',val:'25%'},
  {name:'The Great Thief',rank:'A',atk:475,stat:'Break Intensity',val:'120'},
  {name:'Watch Your Heads!',rank:'A',atk:475,stat:'Crit DMG',val:'40%'},
  {name:'Clear Skies',rank:'A',atk:475,stat:'ATK',val:'25%'},
  {name:'Failing You, Heavy in My Heart',rank:'A',atk:475,stat:'Break Intensity',val:'120'},
  {name:'Drawn Blade',rank:'A',atk:395,stat:'ATK',val:'37.5%'},
  {name:'A Time Will Come',rank:'A',atk:475,stat:'Crit Rate',val:'20%'},
  {name:"The Fools' Spring",rank:'A',atk:395,stat:'DEF',val:'52.5%'},
  {name:'Time Bandit',rank:'A',atk:475,stat:'HP',val:'25%'},
  {name:'Call of the Twisted City',rank:'A',atk:395,stat:'HP',val:'37.5%'},
  {name:'Dangerous Game',rank:'B',atk:380,stat:'Break Intensity',val:'96'},
  {name:'First Step to Success',rank:'B',atk:380,stat:'ATK',val:'20%'},
  {name:'Be Happy',rank:'B',atk:316,stat:'HP',val:'30%'},
  {name:'Us.',rank:'B',atk:380,stat:'ATK',val:'20%'},
  {name:'"Real Music"',rank:'B',atk:380,stat:'ATK',val:'20%'},
];

let currentSort='rarity';
function toggleDropdown(e){
  e.stopPropagation();
  document.getElementById('sortDropdown').classList.toggle('open');
}
function selectSort(el){
  currentSort=el.dataset.value;
  document.getElementById('sortLabel').textContent=el.textContent;
  document.querySelectorAll('#sortMenu .dropdown-item').forEach(i=>i.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('sortDropdown').classList.remove('open');
  render();
}
document.addEventListener('click',()=>document.getElementById('sortDropdown').classList.remove('open'));

function toggleRank(el){
  el.classList.toggle('active');
  render();
}

function cardHTML(w){
  return `<div class="wcard ${w.rank.toLowerCase()}">
    <div class="wicon"><i class="ti ti-sword"></i></div>
    <div class="wbody">
      <div class="wrank ${w.rank.toLowerCase()}">${w.rank}</div>
      <div class="wname" title="${w.name}">${w.name}</div>
      <div class="wstats">
        <div><div class="wstat-label">ATK</div><div class="wstat-val">${w.atk}</div></div>
        <div><div class="wstat-label">${w.stat.toUpperCase()}</div><div class="wstat-val accent2">${w.val}</div></div>
      </div>
    </div>
  </div>`;
}

function render(){
  const q=document.getElementById('searchInput').value.toLowerCase().trim();
  const sort=currentSort;
  const activeRanks=[...document.querySelectorAll('.rarity-btn.active')].map(b=>b.dataset.rank);

  let filtered=ARCS.filter(w=>
    (!q || w.name.toLowerCase().includes(q)) &&
    activeRanks.includes(w.rank)
  );

  if(sort==='name') filtered.sort((a,b)=>a.name.localeCompare(b.name));
  else if(sort==='atk') filtered.sort((a,b)=>b.atk-a.atk);
  else filtered.sort((a,b)=>RANK_ORDER[a.rank]-RANK_ORDER[b.rank] || b.atk-a.atk);

  document.getElementById('resultCount').textContent=`Found ${filtered.length} Arc${filtered.length===1?'':'s'}`;
  const grid=document.getElementById('grid');
  grid.innerHTML = filtered.length
    ? filtered.map(cardHTML).join('')
    : `<div class="empty-msg">No Arcs match your filters.</div>`;
}

render();
</script>
</body>
</html>
