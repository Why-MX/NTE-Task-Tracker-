<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NTE Task Tracker — Neverness to Everness</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0F0E17;--bg2:#1A1825;--bg3:#221F32;--border:#2E2A44;
  --text:#EBE9F8;--text2:#9E9AC0;--text3:#5C5880;
  --accent:#7B5CF5;--accent2:#534AB7;--coral:#D85A30;--teal:#1D9E75;--radius:10px;
  --app-pad: clamp(0.75rem, 4vw, 1.5rem);
  --gap: clamp(8px, 2vw, 14px);
}

/* ── Base ── */
html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}
.app{max-width:860px;margin:0 auto;padding:clamp(1rem,4vw,2rem) var(--app-pad) 5rem}

/* ── Header ── */
.header{
  display:flex;align-items:center;gap:var(--gap);
  margin-bottom:clamp(1.25rem,4vw,2rem);
  flex-wrap:wrap;row-gap:10px;
}
.logo{
  width:clamp(40px,8vw,52px);height:clamp(40px,8vw,52px);
  border-radius:clamp(10px,2vw,14px);
  background:linear-gradient(135deg,#7B5CF5,#3B2FA0);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  box-shadow:0 0 24px rgba(123,92,245,.25);
}
.logo i{font-size:clamp(20px,4vw,26px);color:#fff}
.header-text{flex:1;min-width:0}
.header-text h1{font-size:clamp(16px,4vw,22px);font-weight:600;letter-spacing:-.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-text p{font-size:clamp(11px,2.5vw,13px);color:var(--text2);margin-top:2px}
.header-right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0}

/* ── TZ Dropdown ── */
.tz-dropdown{position:relative;flex-shrink:0}
.tz-trigger{
  display:flex;align-items:center;gap:6px;
  background:var(--bg2);border:1px solid var(--border);border-radius:8px;
  padding:7px 10px;cursor:pointer;transition:border-color .15s;user-select:none;
  min-height:36px;
}
.tz-trigger:hover{border-color:var(--text3)}
.tz-trigger.open{border-color:var(--accent)}
.tz-trigger i.tz-icon{font-size:13px;color:var(--text3);flex-shrink:0}
.tz-trigger-label{
  font-size:clamp(10px,2.5vw,12px);color:var(--text2);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  max-width:clamp(60px,30vw,160px);
}
.tz-trigger i.tz-caret{font-size:12px;color:var(--text3);transition:transform .2s;flex-shrink:0}
.tz-trigger.open i.tz-caret{transform:rotate(180deg);color:var(--accent)}

/* dropdown panel — desktop: anchored below; mobile: fixed sheet */
.tz-menu{
  display:none;position:absolute;top:calc(100% + 6px);right:0;
  width:clamp(200px,70vw,240px);
  background:var(--bg2);border:1px solid var(--border);border-radius:10px;
  box-shadow:0 8px 32px rgba(0,0,0,.6);z-index:1000;overflow:hidden;
}
.tz-menu.open{display:block}
.tz-search-wrap{padding:8px 10px;border-bottom:1px solid var(--border)}
.tz-search{
  width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;
  padding:7px 10px;font-size:13px;color:var(--text);font-family:'Inter',sans-serif;outline:none;
}
.tz-search::placeholder{color:var(--text3)}
.tz-search:focus{border-color:var(--accent)}
.tz-list{max-height:clamp(160px,40vh,240px);overflow-y:auto;padding:4px 0}
.tz-list::-webkit-scrollbar{width:4px}
.tz-list::-webkit-scrollbar-track{background:transparent}
.tz-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:999px}
.tz-option{
  padding:9px 12px;font-size:clamp(11px,2.5vw,12px);color:var(--text2);
  cursor:pointer;transition:background .1s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.tz-option:hover{background:var(--bg3);color:var(--text)}
.tz-option.selected{background:rgba(123,92,245,.15);color:#A997FF;font-weight:500}

/* ── Stats ── */
.stats-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:clamp(6px,2vw,10px);margin-bottom:clamp(1rem,3vw,2rem);
}
.stat-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
  padding:clamp(10px,3vw,14px) clamp(8px,2vw,12px);text-align:center;
}
.stat-num{font-size:clamp(18px,5vw,24px);font-weight:600}
.stat-num span{font-size:clamp(11px,2.5vw,14px);font-weight:400;color:var(--text3)}
.stat-lbl{font-size:clamp(9px,2vw,11px);color:var(--text2);margin-top:4px;text-transform:uppercase;letter-spacing:.06em}
.stat-pct{display:block;font-size:clamp(9px,2vw,11px);color:var(--accent);margin-top:2px;font-weight:500}

/* ── Tabs ── */
.tab-bar{
  display:flex;gap:4px;background:var(--bg2);border:1px solid var(--border);
  border-radius:12px;padding:4px;margin-bottom:1.25rem;
}
.tab-btn{
  flex:1;background:none;border:none;padding:clamp(8px,2vw,10px) 6px;
  font-size:clamp(12px,3vw,13px);color:var(--text2);cursor:pointer;border-radius:9px;
  transition:all .15s;font-family:'Inter',sans-serif;
  display:flex;align-items:center;justify-content:center;gap:5px;
  min-height:40px;-webkit-tap-highlight-color:transparent;
}
.tab-btn i{font-size:clamp(13px,3vw,14px)}
.tab-btn.active{background:var(--accent);color:#fff;font-weight:500}
.tab-btn:hover:not(.active){background:var(--bg3);color:var(--text)}

/* ── Progress ── */
.progress-row{display:flex;justify-content:space-between;align-items:center;font-size:clamp(11px,2.5vw,12px);color:var(--text2);margin-bottom:6px}
.progress-row .pct{color:var(--accent);font-weight:600}
.progress-wrap{background:var(--bg3);border-radius:999px;height:5px;overflow:hidden;margin-bottom:1.25rem}
.progress-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--accent),#A997FF);transition:width .35s ease}

/* ── Section label ── */
.section-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin:1.25rem 0 .4rem;padding-left:4px}

/* ── Tasks ── */
.task-item{
  display:flex;align-items:flex-start;gap:10px;
  padding:clamp(8px,2.5vw,10px) clamp(6px,2vw,10px);
  border-radius:8px;cursor:pointer;transition:background .12s;
  user-select:none;position:relative;-webkit-tap-highlight-color:transparent;
  min-height:44px; /* touch-friendly */
}
.task-item:hover{background:var(--bg2)}
/* on touch devices always show delete btn */
@media(hover:none){.delete-btn{opacity:1 !important}}
.task-item:hover .delete-btn{opacity:1}
.task-item.done .task-text{text-decoration:line-through;color:var(--text3)}
.cb{
  width:clamp(16px,4vw,18px);height:clamp(16px,4vw,18px);
  border-radius:5px;border:1.5px solid var(--border);background:transparent;
  flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.task-item.done .cb{background:var(--accent);border-color:var(--accent)}
.cb i{font-size:11px;color:#fff;display:none}
.task-item.done .cb i{display:block}
.task-text{font-size:clamp(13px,3vw,13.5px);color:var(--text);line-height:1.5;flex:1;word-break:break-word}
.badge{display:inline-block;font-size:10px;font-weight:500;padding:1px 7px;border-radius:999px;margin-right:5px;vertical-align:middle;white-space:nowrap}
.badge-opt{background:rgba(123,92,245,.15);color:#A997FF;border:1px solid rgba(123,92,245,.25)}
.badge-pers{background:rgba(29,158,117,.12);color:#5DCAA5;border:1px solid rgba(29,158,117,.25)}
.badge-monthly{background:rgba(201,139,42,.12);color:#EF9F27;border:1px solid rgba(201,139,42,.25)}
.badge-biweek{background:rgba(216,90,48,.12);color:#F0997B;border:1px solid rgba(216,90,48,.25)}
.badge-custom{background:rgba(123,92,245,.1);color:#C4B5FD;border:1px solid rgba(123,92,245,.2)}
.delete-btn{
  opacity:0;background:none;border:none;cursor:pointer;color:var(--text3);
  font-size:15px;padding:4px 6px;border-radius:4px;flex-shrink:0;
  transition:all .12s;line-height:1;margin-top:0;
  min-width:28px;min-height:28px;display:flex;align-items:center;justify-content:center;
}
.delete-btn:hover{color:#F0997B;background:rgba(216,90,48,.1)}

/* ── Panel ── */
.panel{display:none}.panel.active{display:block}

/* ── Tip box ── */
.tip-box{
  background:rgba(123,92,245,.08);border-left:3px solid var(--accent);
  border-radius:0 8px 8px 0;padding:10px 14px;margin-bottom:1.25rem;
  font-size:clamp(11.5px,2.5vw,12.5px);color:var(--text2);line-height:1.65;
  word-break:break-word;
}
.tip-box b{color:var(--text);font-weight:500}
.countdown{color:var(--accent);font-weight:600;font-variant-numeric:tabular-nums;letter-spacing:.02em;white-space:nowrap}

/* ── Edit / pencil btn on task rows ── */
.edit-btn{
  opacity:0;background:none;border:none;cursor:pointer;color:var(--text3);
  font-size:14px;padding:4px 5px;border-radius:4px;flex-shrink:0;
  transition:all .12s;display:flex;align-items:center;justify-content:center;
  min-width:26px;min-height:26px;
}
.edit-btn:hover{color:var(--accent);background:rgba(123,92,245,.12)}
.task-item:hover .edit-btn{opacity:1}
@media(hover:none){.edit-btn{opacity:1 !important}}

/* ── Modal overlay ── */
.modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);
  z-index:2000;align-items:center;justify-content:center;padding:1rem;
  backdrop-filter:blur(3px);
}
.modal-overlay.open{display:flex}
.modal{
  background:var(--bg2);border:1px solid var(--border);border-radius:14px;
  width:100%;max-width:500px;max-height:90vh;overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,.7);
}
.modal::-webkit-scrollbar{width:4px}
.modal::-webkit-scrollbar-thumb{background:var(--border);border-radius:999px}
.modal-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 18px;border-bottom:1px solid var(--border);position:sticky;top:0;
  background:var(--bg2);z-index:1;
}
.modal-title{font-size:15px;font-weight:600;color:var(--text)}
.modal-close{
  background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;
  width:30px;height:30px;display:flex;align-items:center;justify-content:center;
  border-radius:6px;transition:all .12s;
}
.modal-close:hover{color:var(--text);background:var(--bg3)}
.modal-body{padding:18px}
.modal-footer{
  padding:14px 18px;border-top:1px solid var(--border);
  display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;
}

/* ── Modal form elements ── */
.field{margin-bottom:14px}
.field-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:6px;display:block}
.field input[type=text],.field input[type=number],.field select,.field textarea{
  width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;
  padding:9px 12px;font-size:13px;color:var(--text);font-family:'Inter',sans-serif;
  outline:none;transition:border-color .15s;resize:vertical;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.field input::placeholder,.field textarea::placeholder{color:var(--text3)}
.field select option{background:var(--bg2)}

/* badge pills selector */
.badge-pills{display:flex;gap:6px;flex-wrap:wrap}
.badge-pill{
  padding:4px 12px;border-radius:999px;font-size:11px;font-weight:500;
  cursor:pointer;border:1px solid var(--border);color:var(--text3);
  background:transparent;transition:all .15s;user-select:none;
}
.badge-pill:hover{border-color:var(--text3);color:var(--text2)}
.badge-pill.active-opt{background:rgba(123,92,245,.2);color:#A997FF;border-color:rgba(123,92,245,.5)}
.badge-pill.active-pers{background:rgba(29,158,117,.2);color:#5DCAA5;border-color:rgba(29,158,117,.5)}
.badge-pill.active-monthly{background:rgba(201,139,42,.2);color:#EF9F27;border-color:rgba(201,139,42,.5)}
.badge-pill.active-biweek{background:rgba(216,90,48,.2);color:#F0997B;border-color:rgba(216,90,48,.5)}
.badge-pill.active-custom{background:rgba(123,92,245,.15);color:#C4B5FD;border-color:rgba(123,92,245,.4)}

/* toggle row */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0}
.toggle-label{font-size:13px;color:var(--text2)}
.toggle{position:relative;width:38px;height:22px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-slider{
  position:absolute;inset:0;background:var(--bg3);border:1px solid var(--border);
  border-radius:999px;cursor:pointer;transition:.2s;
}
.toggle-slider::before{
  content:'';position:absolute;width:16px;height:16px;
  left:2px;top:50%;transform:translateY(-50%);
  background:var(--text3);border-radius:50%;transition:.2s;
}
.toggle input:checked + .toggle-slider{background:var(--accent);border-color:var(--accent)}
.toggle input:checked + .toggle-slider::before{left:18px;background:#fff}

/* counter fields row */
.counter-fields{display:flex;gap:8px;margin-top:8px}
.counter-fields .field{flex:1;margin-bottom:0}

/* sublist editor */
.subitems-list{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.subitem-row{display:flex;gap:6px;align-items:center}
.subitem-row input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:7px 10px;font-size:12.5px;color:var(--text);font-family:'Inter',sans-serif;outline:none;transition:border-color .15s}
.subitem-row input:focus{border-color:var(--accent)}
.subitem-row input::placeholder{color:var(--text3)}
.subitem-max{width:62px;flex-shrink:0;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:7px 8px;font-size:12px;color:var(--text);font-family:'Inter',sans-serif;outline:none;text-align:center}
.subitem-max:focus{border-color:var(--accent)}
.subitem-max::placeholder{color:var(--text3)}
.subitem-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:15px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:5px;transition:all .12s;flex-shrink:0}
.subitem-del:hover{color:#F0997B;background:rgba(216,90,48,.1)}
.add-subitem-btn{
  background:none;border:1px dashed var(--border);border-radius:7px;
  padding:7px 12px;font-size:12px;color:var(--text3);cursor:pointer;
  font-family:'Inter',sans-serif;transition:all .15s;width:100%;margin-top:4px;
  display:flex;align-items:center;justify-content:center;gap:5px;
}
.add-subitem-btn:hover{border-color:var(--accent);color:var(--accent)}

/* reset override */
.reset-override{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.reset-override select,.reset-override input{flex:1;min-width:80px}

/* modal buttons */
.btn-primary{background:var(--accent);border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:500;color:#fff;cursor:pointer;font-family:'Inter',sans-serif;transition:opacity .15s;display:flex;align-items:center;gap:5px}
.btn-primary:hover{opacity:.85}
.btn-secondary{background:none;border:1px solid var(--border);border-radius:8px;padding:9px 14px;font-size:13px;color:var(--text2);cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
.btn-secondary:hover{background:var(--bg3);color:var(--text)}
.btn-danger{background:none;border:1px solid rgba(216,90,48,.3);border-radius:8px;padding:9px 14px;font-size:13px;color:#F0997B;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;margin-right:auto}
.btn-danger:hover{background:rgba(216,90,48,.1)}

/* ── Sublist (collapsible) ── */
.task-item.has-sub{flex-wrap:wrap;cursor:pointer}
.task-item.has-sub:hover{background:var(--bg2)}
.task-item.has-sub .cb{cursor:default;opacity:.4}
.task-item.has-sub .sub-caret{font-size:13px;color:var(--text3);margin-left:auto;transition:transform .2s;flex-shrink:0}
.task-item.has-sub.sub-open .sub-caret{transform:rotate(180deg);color:var(--accent)}
.parent-all-done .cb{opacity:1 !important;background:var(--accent) !important;border-color:var(--accent) !important}
.parent-all-done .cb i{display:block !important}
.parent-all-done .task-text{text-decoration:line-through;color:var(--text3)}
.sublist-wrap{
  width:100%;
  display:none;
  padding:4px 0 6px 28px;
  border-left:2px solid var(--border);
  margin:4px 0 2px 18px;
  flex-direction:column;gap:2px;
}
.task-item.has-sub.sub-open .sublist-wrap{display:flex}
.sublist-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:7px;min-height:40px}
.sublist-item .task-text{font-size:13px;color:var(--text2);flex:1}
.sublist-item.done .task-text{text-decoration:line-through;color:var(--text3)}
/* sub-items with counters fill the row */
.sublist-item.has-counter{flex-wrap:wrap}
.sublist-item.has-counter .counter-bar-wrap{width:100%;margin-left:26px;margin-bottom:2px}
.counter-wrap{display:flex;align-items:center;gap:6px;margin-left:auto;flex-shrink:0}
.counter-btn{
  width:26px;height:26px;border-radius:6px;border:1px solid var(--border);
  background:var(--bg3);color:var(--text2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:600;line-height:1;
  transition:all .12s;flex-shrink:0;user-select:none;
  -webkit-tap-highlight-color:transparent;
}
.counter-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff}
.counter-btn:active{transform:scale(.88)}
.counter-display{
  font-size:12px;font-weight:600;color:var(--accent);
  font-variant-numeric:tabular-nums;white-space:nowrap;
  min-width:44px;text-align:center;
}
.counter-display.done-count{color:var(--teal,#1D9E75)}
.counter-bar-wrap{
  height:3px;background:var(--bg3);border-radius:999px;
  overflow:hidden;margin-top:4px;
}
.counter-bar-fill{
  height:100%;border-radius:999px;
  background:linear-gradient(90deg,var(--accent),#A997FF);
  transition:width .3s ease;
}
/* task row layout when counter present */
.task-item.has-counter{flex-wrap:wrap;align-items:center}
.task-item.has-counter .task-text{flex:1;min-width:0}
.task-item.has-counter .counter-bar-wrap{width:100%;margin-left:28px;margin-bottom:2px}

/* ── Add task ── */
.add-task-area{margin-top:1.5rem;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.add-task-header{
  display:flex;align-items:center;gap:8px;
  padding:clamp(10px,3vw,12px) 14px;
  cursor:pointer;font-size:clamp(12px,3vw,13px);color:var(--text2);
  user-select:none;transition:color .15s;min-height:44px;
  -webkit-tap-highlight-color:transparent;
}
.add-task-header:hover{color:var(--text)}
.add-task-header i.toggle-icon{margin-left:auto;font-size:14px;transition:transform .2s}
.add-task-header.open i.toggle-icon{transform:rotate(45deg)}
.add-task-header i.plus-icon{color:var(--accent);font-size:15px}
.add-task-form{display:none;padding:0 12px 14px;border-top:1px solid var(--border)}
.add-task-form.open{display:block}
.form-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.form-row input[type=text]{
  flex:1;min-width:0;background:var(--bg3);border:1px solid var(--border);border-radius:8px;
  padding:10px 12px;font-size:clamp(13px,3vw,13px);color:var(--text);
  font-family:'Inter',sans-serif;outline:none;transition:border-color .15s;
  width:100%;/* fallback for narrow */
}
.form-row input[type=text]:focus{border-color:var(--accent)}
.form-row input[type=text]::placeholder{color:var(--text3)}
.form-select{
  background:var(--bg3);border:1px solid var(--border);border-radius:8px;
  padding:10px 10px;font-size:clamp(11px,2.5vw,12px);color:var(--text2);
  font-family:'Inter',sans-serif;outline:none;cursor:pointer;
  transition:border-color .15s;flex-shrink:0;
}
.form-select:focus{border-color:var(--accent)}
.add-btn{
  background:var(--accent);border:none;border-radius:8px;
  padding:10px 16px;font-size:clamp(12px,3vw,13px);font-weight:500;color:#fff;
  cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap;
  transition:opacity .15s;display:flex;align-items:center;gap:5px;flex-shrink:0;
}
.add-btn:hover{opacity:.85}
.add-btn:active{opacity:.7;transform:scale(.97)}

/* ── Buttons ── */
.btn-row{display:flex;gap:8px;margin-top:1.5rem;flex-wrap:wrap}
.reset-btn{
  background:none;border:1px solid var(--border);
  padding:clamp(8px,2vw,9px) clamp(12px,3vw,16px);
  border-radius:8px;font-size:clamp(12px,2.5vw,12.5px);color:var(--text2);
  cursor:pointer;font-family:'Inter',sans-serif;
  display:flex;align-items:center;gap:5px;transition:all .15s;
  min-height:40px;-webkit-tap-highlight-color:transparent;
}
.reset-btn:hover{background:var(--bg2);color:var(--text);border-color:var(--text3)}
.reset-btn:active{opacity:.7}

/* ════════════════════════════════════════
   RESPONSIVE BREAKPOINTS
════════════════════════════════════════ */

/* ── Large desktop (1200px+) ── */
@media(min-width:1200px){
  .app{padding-top:2.5rem;padding-bottom:5rem}
}

/* ── Tablet landscape / small desktop (768–1199px) ── */
@media(max-width:1199px) and (min-width:768px){
  .stats-grid{gap:12px}
}

/* ── Tablet portrait (600–767px) ── */
@media(max-width:767px) and (min-width:600px){
  .header-text h1{font-size:19px}
  .tz-trigger-label{max-width:130px}
}

/* ── Large phone (480–599px) ── */
@media(max-width:599px){
  .tab-btn span{display:none}
  .tab-btn{gap:0}
  .tz-trigger-label{max-width:100px}
  .form-row{flex-direction:column}
  .form-row input[type=text]{width:100%}
  .form-select{width:100%}
  .add-btn{width:100%;justify-content:center}
}

/* ── Small phone (max 420px) ── */
@media(max-width:420px){
  .header{gap:10px}
  .header-text h1{font-size:15px}
  .header-text p{display:none}
  .stat-num{font-size:16px}
  .stat-lbl{font-size:8px}
  .stat-pct{font-size:9px}
  .tz-trigger-label{max-width:72px}
  .task-text{font-size:12.5px}
  /* TZ menu fills more of the screen width */
  .tz-menu{width:min(240px, calc(100vw - 2rem));right:0}
}

/* ── Tiny phone (max 320px) ── */
@media(max-width:320px){
  .app{padding-left:.6rem;padding-right:.6rem}
  .header-text h1{font-size:13px}
  .stats-grid{gap:5px}
  .stat-card{padding:8px 4px}
  .stat-num{font-size:14px}
  .tz-trigger-label{display:none}
  .tz-trigger{padding:7px 8px;gap:4px}
}

/* ── Touch-only: bigger tap targets, always-visible delete ── */
@media(hover:none) and (pointer:coarse){
  .task-item{padding-top:11px;padding-bottom:11px}
  .delete-btn{opacity:1;color:var(--text3)}
  .tab-btn{min-height:46px}
  .reset-btn{min-height:46px}
  .add-task-header{min-height:48px}
  /* On mobile the TZ menu opens as bottom sheet */
  .tz-menu{
    position:fixed;bottom:0;left:0;right:0;top:auto;width:100%;
    border-radius:16px 16px 0 0;border-bottom:none;
    max-height:70vh;display:flex;flex-direction:column;
  }
  .tz-menu.open{display:flex}
  .tz-list{flex:1;max-height:none}
}

/* ── Wide / 4K ── */
@media(min-width:1600px){
  .app{max-width:960px}
  .header-text h1{font-size:26px}
  .stat-num{font-size:28px}
  .task-text{font-size:15px}
}

/* ── Reduced motion ── */
@media(prefers-reduced-motion:reduce){
  *{transition:none !important;animation:none !important}
}

<script>
// ─── Timezone list (offset in minutes from UTC) ──────────────────────────────
const TIMEZONES = [
  {label:'UTC−12:00 (BIT)',        offset:-720},
  {label:'UTC−11:00 (NUT)',        offset:-660},
  {label:'UTC−10:00 (HST, Hawaii)',offset:-600},
  {label:'UTC−09:30 (MART)',       offset:-570},
  {label:'UTC−09:00 (AKST)',       offset:-540},
  {label:'UTC−08:00 (PST)',        offset:-480},
  {label:'UTC−07:00 (MST)',        offset:-420},
  {label:'UTC−06:00 (CST)',        offset:-360},
  {label:'UTC−05:00 (EST)',        offset:-300},
  {label:'UTC−04:00 (AST, EDT)',   offset:-240},
  {label:'UTC−03:30 (NST)',        offset:-210},
  {label:'UTC−03:00 (ART, BRT)',   offset:-180},
  {label:'UTC−02:00 (GST)',        offset:-120},
  {label:'UTC−01:00 (CVT)',        offset:-60},
  {label:'UTC±00:00 (GMT, WET)',   offset:0},
  {label:'UTC+01:00 (CET, WAT)',   offset:60},
  {label:'UTC+02:00 (EET, CAT)',   offset:120},
  {label:'UTC+03:00 (MSK, EAT)',   offset:180},
  {label:'UTC+03:30 (IRST)',       offset:210},
  {label:'UTC+04:00 (GST, AMT)',   offset:240},
  {label:'UTC+04:30 (AFT)',        offset:270},
  {label:'UTC+05:00 (PKT, UZT)',   offset:300},
  {label:'UTC+05:30 (IST, SLT)',   offset:330},
  {label:'UTC+05:45 (NPT)',        offset:345},
  {label:'UTC+06:00 (BDT, BSST)', offset:360, default:true},
  {label:'UTC+06:30 (MMT)',        offset:390},
  {label:'UTC+07:00 (ICT, WIB)',   offset:420},
  {label:'UTC+08:00 (CST, HKT)',   offset:480},
  {label:'UTC+08:45 (ACWST)',      offset:525},
  {label:'UTC+09:00 (JST, KST)',   offset:540},
  {label:'UTC+09:30 (ACST)',       offset:570},
  {label:'UTC+10:00 (AEST, PGT)',  offset:600},
  {label:'UTC+10:30 (LHST)',       offset:630},
  {label:'UTC+11:00 (SBT, NCT)',   offset:660},
  {label:'UTC+12:00 (NZST, FJT)', offset:720},
  {label:'UTC+12:45 (CHAST)',      offset:765},
  {label:'UTC+13:00 (PHOT, TOT)', offset:780},
  {label:'UTC+14:00 (LINT)',       offset:840},
];

// ─── Storage helpers ──────────────────────────────────────────────────────────
const ls = {
  get:(k,def='{}')=>{try{return JSON.parse(localStorage.getItem(k)||def)}catch{return JSON.parse(def)}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}},
};
const getState  = ()=>ls.get('nte_v1');
const setState  = s=>ls.set('nte_v1',s);
const getCustom = ()=>ls.get('nte_custom','{"daily":[],"weekly":[],"monthly":[]}');
const setCustom = c=>ls.set('nte_custom',c);
const getMeta   = ()=>ls.get('nte_meta');
const setMeta   = m=>ls.set('nte_meta',m);
const getCounters = ()=>ls.get('nte_counters');
const setCounters = c=>ls.set('nte_counters',c);
function getCounter(id){return parseInt(getCounters()[id]||0,10)}
function setCounter(id,val){const c=getCounters();c[id]=val;setCounters(c)}

// ─── Timezone state ───────────────────────────────────────────────────────────
let TZ_OFFSET = 360; // default BDT (UTC+6), in minutes

function getTZOffset(){
  return TZ_OFFSET;
}
function nowInTZ(){
  // Returns a Date whose UTC fields represent local time in the selected TZ
  return new Date(Date.now() + getTZOffset()*60000);
}

// ─── Period helpers ───────────────────────────────────────────────────────────
// "Daily period": calendar date in selected TZ, but day starts at 02:00 not 00:00.
// Before 02:00 = still the previous calendar date's period.
function getDailyPeriod(){
  const t = nowInTZ();
  if(t.getUTCHours() < 2) t.setUTCDate(t.getUTCDate()-1);
  return t.toISOString().slice(0,10);
}
// "Weekly period": ISO date of the Monday that opened this week (week starts Mon 02:00 in TZ).
function getWeeklyPeriod(){
  const t = nowInTZ();
  let day = t.getUTCDay(); // 0=Sun
  const beforeResetOnMonday = (day===1 && t.getUTCHours()<2);
  // days since last Monday (treat Sun=7 for mod arithmetic)
  const dayAdj = day===0 ? 7 : day;
  let diff = dayAdj - 1; // 0 on Mon, 6 on Sun
  if(beforeResetOnMonday) diff += 7; // still last week
  const monday = new Date(t);
  monday.setUTCDate(t.getUTCDate() - diff);
  return monday.toISOString().slice(0,10);
}

// ─── Next reset timestamps (UTC ms) ──────────────────────────────────────────
function nextDailyReset(){
  const t = nowInTZ(); // local time in selected TZ
  // Next 02:00 in TZ
  const next = new Date(t);
  next.setUTCHours(2,0,0,0);
  if(next <= t) next.setUTCDate(next.getUTCDate()+1);
  // Convert back to UTC ms
  return next.getTime() - getTZOffset()*60000;
}
function nextWeeklyReset(){
  const t = nowInTZ();
  const day = t.getUTCDay(); // 0=Sun
  const dayAdj = day===0 ? 7 : day;
  let daysUntilMon = (8 - dayAdj) % 7; // days until next Monday
  if(daysUntilMon===0 && t.getUTCHours()>=2) daysUntilMon=7; // already past reset today
  const next = new Date(t);
  next.setUTCDate(t.getUTCDate() + daysUntilMon);
  next.setUTCHours(2,0,0,0);
  return next.getTime() - getTZOffset()*60000;
}

function fmtCountdown(ms){
  if(ms<=0) return '00:00:00';
  const s=Math.floor(ms/1000);
  const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sc=s%60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`;
}

function tzLabel(){
  const tz = TIMEZONES.find(z=>z.offset===TZ_OFFSET);
  // Extract just the offset part like "+06:00"
  const sign = TZ_OFFSET>=0?'+':'-';
  const abs = Math.abs(TZ_OFFSET);
  const hh = String(Math.floor(abs/60)).padStart(2,'0');
  const mm = String(abs%60).padStart(2,'0');
  return `UTC${sign}${hh}:${mm}`;
}

function updateTipBoxes(){
  const tz = tzLabel();
  const d = document.getElementById('tipDaily');
  const w = document.getElementById('tipWeekly');
  if(d) d.innerHTML = `<b>Daily reset</b> — Auto-resets at <b>2:00 AM (${tz})</b> every day. &nbsp;⏱ Resets in <span class="countdown" id="countdown-daily">--:--:--</span>`;
  if(w) w.innerHTML = `<b>Weekly tasks</b> — Auto-resets every <b>Monday at 2:00 AM (${tz})</b>. Some items reset every 2 weeks <span class="badge badge-biweek">bi-weekly</span>. &nbsp;⏱ Resets in <span class="countdown" id="countdown-weekly">--:--:--</span>`;
}

// ─── Auto-reset on load ───────────────────────────────────────────────────────
function silentResetTab(tab){
  const state=getState(), custom=getCustom(), counters=getCounters();
  TASKS[tab].forEach(sec=>sec.items.forEach(i=>{
    delete state[i.id];
    if(i.counter) delete counters[i.id];
    if(i.subItems) i.subItems.forEach(s=>{ delete state[s.id]; if(s.counter) delete counters[s.id]; });
  }));
  (custom[tab]||[]).forEach(i=>{delete state[i.id];});
  setState(state); setCounters(counters);
}
function checkAutoReset(){
  const meta=getMeta();
  const dp=getDailyPeriod(), wp=getWeeklyPeriod();
  let changed=false;
  if(meta.lastDailyPeriod!==dp){silentResetTab('daily');meta.lastDailyPeriod=dp;changed=true;}
  if(meta.lastWeeklyPeriod!==wp){silentResetTab('weekly');meta.lastWeeklyPeriod=wp;changed=true;}
  if(changed) setMeta(meta);
}

// ─── Countdown ticker ─────────────────────────────────────────────────────────
let tickerInterval=null;
function startCountdowns(){
  if(tickerInterval) clearInterval(tickerInterval);
  function tick(){
    const now=Date.now();
    const dc=document.getElementById('countdown-daily');
    const wc=document.getElementById('countdown-weekly');
    const dms=nextDailyReset()-now;
    const wms=nextWeeklyReset()-now;
    if(dc) dc.textContent=fmtCountdown(dms);
    if(wc) wc.textContent=fmtCountdown(wms);
    // live auto-reset
    if(dms<=0){
      const meta=getMeta(), p=getDailyPeriod();
      if(meta.lastDailyPeriod!==p){meta.lastDailyPeriod=p;setMeta(meta);silentResetTab('daily');renderList('daily');renderCustomList('daily');updateProgress('daily');updateStats();}
    }
    if(wms<=0){
      const meta=getMeta(), p=getWeeklyPeriod();
      if(meta.lastWeeklyPeriod!==p){meta.lastWeeklyPeriod=p;setMeta(meta);silentResetTab('weekly');renderList('weekly');renderCustomList('weekly');updateProgress('weekly');updateStats();}
    }
  }
  tick();
  tickerInterval=setInterval(tick,1000);
}

// ─── Custom TZ dropdown ───────────────────────────────────────────────────────
function buildTZSelect(){
  const saved=parseInt(localStorage.getItem('nte_tz')||'360',10);
  TZ_OFFSET=saved;
  renderTzList('');
  // Set trigger label
  const tz=TIMEZONES.find(z=>z.offset===saved)||TIMEZONES.find(z=>z.default);
  document.getElementById('tzTriggerLabel').textContent=tz?tz.label:'UTC+06:00';
  // Close on outside click
  document.addEventListener('click',e=>{
    if(!document.getElementById('tzDropdown').contains(e.target)) closeTzMenu();
  });
}
function renderTzList(filter){
  const q=filter.toLowerCase();
  const list=document.getElementById('tzList');
  list.innerHTML=TIMEZONES
    .filter(z=>!q||z.label.toLowerCase().includes(q))
    .map(z=>`<div class="tz-option${z.offset===TZ_OFFSET?' selected':''}" data-offset="${z.offset}" onclick="selectTz(${z.offset},${JSON.stringify(z.label)})">${z.label}</div>`)
    .join('');
}
function filterTz(){
  renderTzList(document.getElementById('tzSearch').value);
}
function toggleTzMenu(){
  const trigger=document.getElementById('tzTrigger');
  const menu=document.getElementById('tzMenu');
  const opening=!menu.classList.contains('open');
  menu.classList.toggle('open',opening);
  trigger.classList.toggle('open',opening);
  if(opening){
    document.getElementById('tzSearch').value='';
    renderTzList('');
    document.getElementById('tzSearch').focus();
    // Scroll selected into view
    setTimeout(()=>{
      const sel=document.querySelector('.tz-option.selected');
      if(sel) sel.scrollIntoView({block:'nearest'});
    },50);
  }
}
function closeTzMenu(){
  document.getElementById('tzMenu').classList.remove('open');
  document.getElementById('tzTrigger').classList.remove('open');
}
function selectTz(offset,label){
  TZ_OFFSET=offset;
  localStorage.setItem('nte_tz',offset);
  document.getElementById('tzTriggerLabel').textContent=label;
  closeTzMenu();
  checkAutoReset();
  ['daily','weekly','monthly'].forEach(t=>{renderList(t);renderCustomList(t);updateProgress(t);});
  updateStats();
  updateTipBoxes();
  startCountdowns();
}
function onTzChange(){} // kept for compat, unused

// ─── Task data ────────────────────────────────────────────────────────────────
const TASKS = {

    {section:"Core dailies",items:[

    ]},
  ],
  weekly:[
    {section:"Weekly tasks",items:[
      {id:"w1",text:"Use Weekly City Stamina"},
      {id:"w2",text:"Collect 16k Fons weekly on map"},
      {id:"w3",badge:"biweek",text:"Pink Paw Heist for 1m Fons (resets every 2 weeks)"},
      {id:"w4",badge:"biweek",text:"Pink Paw Heist Challenges for Pink Paw Coins (resets every 2 weeks)"},
      {id:"w5",text:"Weekly Battle Pass Mission (Circle Bounty)"},
      {id:"w6",text:"Auction"},
      {id:"w7",text:"Weekly 3 Anomoly Boss"},
      {id:"w8",text:"Mamon Boss Anomoly Furniture"},
      {id:"w9",text:"Use Butler Anomoly Furniture — weekly limit"},
      {id:"w10",text:"Use Mailbox Anomoly Furniture — 1 Delivery"},
      {id:"w11",text:"Collect Lost Wallet",counter:{max:100}},
      {id:"w12",text:"Steal Bond / Furniture items from DSD Toy Shop ×3"},
      {id:"w13",badge:"biweek",text:"Beyond the Rails (resets every 2 weeks)"},
    ]},
  ],
  monthly:[
    {section:"Monthly tasks",items:[
      {id:"m1",badge:"monthly",text:"Monthly Battle Pass Mission (Circle Bounty)"},
      {id:"m2",badge:"monthly",text:"Fair Exchange / Lost Exchange — get All Dices, Tri-Keys, Fons, Beetle Coins, Fluffy Cotton & Dreamless Seed"},
      {id:"m3",text:"Buy All Hunter Exchange Item"},
      {id:"m4",text:"Online Race ACE Rank"},
      {id:"m5",text:"200,000 Scale Coin for 600,000 Beetle Coin"},
    ]},
  ],
};

const BADGES={
  opt:'<span class="badge badge-opt">optional</span>',
  pers:'<span class="badge badge-pers">personal</span>',
  monthly:'<span class="badge badge-monthly">monthly</span>',
  biweek:'<span class="badge badge-biweek">bi-weekly</span>',
  custom:'<span class="badge badge-custom">custom</span>',
};

// ─── Render ───────────────────────────────────────────────────────────────────
function renderCounterItem(item, tab, isSubItem=false){
  const val=getCounter(item.id), max=item.counter.max;
  const pct=Math.min(100,Math.round(val/max*100));
  const full=(val>=max);
  const wrapClass=isSubItem ? `sublist-item has-counter${full?' done':''}` : `task-item has-counter${full?' done':''}`;
  const idAttr=`id="citem-${item.id}"`;
  return `<div class="${wrapClass}" ${idAttr}>
    <div class="cb" style="cursor:default">${full?'<i class="ti ti-check"></i>':''}</div>
    <div class="task-text">${item.text}</div>
    <div class="counter-wrap" onclick="event.stopPropagation()">
      <button class="counter-btn" onclick="stepCounter('${item.id}','${tab}',-1)" title="−1">−</button>
      <span class="counter-display${full?' done-count':''}">${val}<span style="color:var(--text3);font-weight:400">/${max}</span></span>
      <button class="counter-btn" onclick="stepCounter('${item.id}','${tab}',1)" title="+1">+</button>
    </div>
    <div class="counter-bar-wrap"><div class="counter-bar-fill" style="width:${pct}%"></div></div>
  </div>`;
}

function renderList(tab){
  const state=getState(), el=document.getElementById(tab+'List');
  let html='';
  TASKS[tab].forEach(sec=>{
    html+=`<div class="section-label">${sec.section}</div>`;
    sec.items.forEach(item=>{
      const b=item.badge?BADGES[item.badge]:'';
      if(item.subItems){
        const allDone=item.subItems.every(s=>s.counter ? getCounter(s.id)>=s.counter.max : !!state[s.id]);
        const isOpen=state['sub_open_'+item.id]!==false; // open by default
        html+=`<div class="task-item has-sub${allDone?' parent-all-done':''}${isOpen?' sub-open':''}" onclick="toggleSublist('${item.id}','${tab}',this)">
          <div class="cb"><i class="ti ti-check"></i></div>
          <div class="task-text">${b}${item.text}</div>
          <i class="ti ti-chevron-down sub-caret"></i>
          <div class="sublist-wrap" onclick="event.stopPropagation()">
            ${item.subItems.map(s=>s.counter ? renderCounterItem(s,tab,true) : `
            <div class="sublist-item${state[s.id]?' done':''}" onclick="toggleTask('${s.id}','${tab}',this)">
              <div class="cb"><i class="ti ti-check"></i></div>
              <div class="task-text">${s.text}</div>
            </div>`).join('')}
          </div>
        </div>`;
      } else if(item.counter){
        html+=renderCounterItem(item,tab,false);
      } else {
        const done=!!state[item.id];
        html+=`<div class="task-item${done?' done':''}" onclick="toggleTask('${item.id}','${tab}',this)">
          <div class="cb"><i class="ti ti-check"></i></div>
          <div class="task-text">${b}${item.text}</div></div>`;
      }
    });
  });
  el.innerHTML=html;
}
function renderCustomList(tab){
  const state=getState(), custom=getCustom(), items=custom[tab]||[];
  const el=document.getElementById(tab+'CustomList');
  if(!items.length){el.innerHTML='';return;}
  let html=`<div class="section-label">My custom tasks</div>`;
  items.forEach(item=>{
    const done=!!state[item.id], b=item.badge?BADGES[item.badge]:BADGES['custom'];
    html+=`<div class="task-item${done?' done':''}" onclick="toggleTask('${item.id}','${tab}',this)">
      <div class="cb"><i class="ti ti-check"></i></div>
      <div class="task-text">${b}${item.text}</div>
      <button class="delete-btn" onclick="deleteCustomTask(event,'${item.id}','${tab}')" title="Remove"><i class="ti ti-x"></i></button>
    </div>`;
  });
  el.innerHTML=html;
}

function toggleTask(id,tab,el){
  const state=getState();
  state[id]=!state[id];
  setState(state);
  el.classList.toggle('done',!!state[id]);
  updateProgress(tab);
  updateStats();
}

// ─── Custom tasks ─────────────────────────────────────────────────────────────
function addCustomTask(tab){
  const inp=document.getElementById('addInput-'+tab);
  const bsel=document.getElementById('addBadge-'+tab);
  const text=inp.value.trim(); if(!text)return;
  const custom=getCustom();
  custom[tab]=custom[tab]||[];
  custom[tab].push({id:'c_'+tab+'_'+Date.now(),text,badge:bsel.value||null});
  setCustom(custom); inp.value=''; bsel.value='';
  renderCustomList(tab); updateProgress(tab); updateStats(); inp.focus();
}
function deleteCustomTask(e,id,tab){
  e.stopPropagation();
  const custom=getCustom(); custom[tab]=(custom[tab]||[]).filter(i=>i.id!==id); setCustom(custom);
  const state=getState(); delete state[id]; setState(state);
  renderCustomList(tab); updateProgress(tab); updateStats();
}
function stepCounter(id, tab, delta){
  // find item — could be top-level or inside subItems
  let item=null;
  TASKS[tab].forEach(s=>s.items.forEach(i=>{
    if(i.id===id && i.counter) item=i;
    if(i.subItems) i.subItems.forEach(si=>{ if(si.id===id && si.counter) item=si; });
  }));
  if(!item) return;
  const max=item.counter.max;
  const next=Math.max(0, Math.min(max, getCounter(id)+delta));
  setCounter(id, next);
  renderList(tab); updateProgress(tab); updateStats();
}
function toggleSublist(id, tab, el){
  const state=getState();
  const isOpen=el.classList.toggle('sub-open');
  state['sub_open_'+id]=isOpen;
  setState(state);
}
function toggleAddForm(tab){
  const h=document.getElementById('addHeader-'+tab), f=document.getElementById('addForm-'+tab);
  const open=f.classList.toggle('open'); h.classList.toggle('open',open);
  if(open)document.getElementById('addInput-'+tab).focus();
}

// ─── Progress & stats ─────────────────────────────────────────────────────────
function countTab(tab){
  const state=getState(), custom=getCustom();
  let total=0, done=0;
  TASKS[tab].forEach(sec=>sec.items.forEach(i=>{
    if(i.subItems){
      i.subItems.forEach(s=>{
        total++;
        if(s.counter) done+=(getCounter(s.id)>=s.counter.max?1:0);
        else if(state[s.id]) done++;
      });
    } else {
      total++;
      if(i.counter) done+=(getCounter(i.id)>=i.counter.max?1:0);
      else if(state[i.id]) done++;
    }
  }));
  (custom[tab]||[]).forEach(i=>{total++;if(state[i.id])done++;});
  return{total,done};
}
function updateProgress(tab){
  const{total,done}=countTab(tab), pct=total?Math.round(done/total*100):0;
  document.getElementById(tab+'Bar').style.width=pct+'%';
  document.getElementById(tab+'Pct').textContent=pct+'%';
  document.getElementById(tab+'Lbl').textContent=done+' of '+total+' done';
}
function updateStats(){
  const tabs=['daily','weekly','monthly'], labels=['Daily','Weekly','Monthly'];
  document.getElementById('statsGrid').innerHTML=tabs.map((t,i)=>{
    const{total,done}=countTab(t), pct=total?Math.round(done/total*100):0;
    return`<div class="stat-card"><div class="stat-num">${done}<span>/${total}</span></div><div class="stat-lbl">${labels[i]}</div><span class="stat-pct">${pct}%</span></div>`;
  }).join('');
}

// ─── Reset ────────────────────────────────────────────────────────────────────
function resetTab(tab){
  const state=getState(), custom=getCustom(), counters=getCounters();
  TASKS[tab].forEach(sec=>sec.items.forEach(i=>{
    delete state[i.id];
    if(i.counter) delete counters[i.id];
    if(i.subItems) i.subItems.forEach(s=>{ delete state[s.id]; if(s.counter) delete counters[s.id]; });
  }));
  (custom[tab]||[]).forEach(i=>{delete state[i.id];}); setState(state); setCounters(counters);
  renderList(tab); renderCustomList(tab); updateProgress(tab); updateStats();
}

// ─── Tab switch ───────────────────────────────────────────────────────────────
function switchTab(tab){
  ['daily','weekly','monthly'].forEach(t=>{
    document.getElementById('tab-'+t).classList.toggle('active',t===tab);
    document.getElementById(t+'Panel').classList.toggle('active',t===tab);
  });
}

// ─── Init ─────────────────────────────────────────────────────────────────────
buildTZSelect();
checkAutoReset();
['daily','weekly','monthly'].forEach(t=>{renderList(t);renderCustomList(t);updateProgress(t);});
updateStats();
updateTipBoxes();
startCountdowns();
</script>
